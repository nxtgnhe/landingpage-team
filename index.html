<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.6.0/css/all.css">

    </head>
    <body>
    <div class="hello">
    <h1>Our Awesome Team</h1>
    <p class="hello-p">We have created a new product that will help designers, 
    developers and companies create websites for their startups quickly and easily.</p>
    <button class="button"><a href="#">Enjoy Our Team</a></button>
    </div>
    <div class="container">
        <div class="member">
            <div class="card">
                <div class="avatar"><img src="img/vanessa.jpg" alt="Vanessa"></div>
                <div class="name"><span>Vanessa Laird</span></div>
                <div class="work"><span>UI Designer</span></div>
                <div class="icons">
                <a class="icon_fb" href="#"><i class="fa-brands fa-square-facebook"></i></a>
                <a class="icon_tw" href="#"><i class="fa-brands fa-twitter"></i></a>
                <a class="icon_dribble" href="#"><i class="fa-brands fa-dribbble"></i></a>
                </div>
            </div>
        </div>
        <div class="member">
            <div class="card">
                <div class="avatar"><img src="img/mason.jpg" alt="Mason"></div>
                <div class="name"><span>Mason Campbell</span></div>
                <div class="work"><span>UI Designer</span></div>
                <div class="icons">
                <a class="icon_fb" href="#"><i class="fa-brands fa-square-facebook"></i></a>
                <a class="icon_tw" href="#"><i class="fa-brands fa-twitter"></i></a>
                <a class="icon_dribble" href="#"><i class="fa-brands fa-dribbble"></i></a>
                </div>
            </div>
        </div>
        <div class="member">
            <div class="card">
                <div class="avatar"><img src="img/ireaevans.jpg" alt=""></div>
                <div class="name"><span>Irea Evans</span></div>
                <div class="work"><span>Client Manager</span></div>
                <div class="icons">
                <a class="icon_fb" href="#"><i class="fa-brands fa-square-facebook"></i></a>
                <a class="icon_tw" href="#"><i class="fa-brands fa-twitter"></i></a>
                <a class="icon_dribble" href="#"><i class="fa-brands fa-dribbble"></i></a>
                </div>
            </div>
        </div>
    </div>
    </body>
</html>
